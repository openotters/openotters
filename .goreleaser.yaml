version: 2

project_name: otters

before:
  hooks:
    - go mod tidy
    # The Next.js static export is embedded into ottersd via
    # `go:embed all:dist` (internal/webui/dist). The repo only commits
    # `dist/.gitkeep`, so every release rebuilds the bundle from
    # source under app/ to keep the binary in sync with the UI code.
    # `npm ci` is hermetic; `npm run build` produces app/out which is
    # then mirrored into internal/webui/dist before any Go build runs.
    #
    # `before.hooks` entries are strings split by shellwords, so each
    # multi-step command goes through `sh -c "..."` to keep `cd` and
    # `&&` working as expected.
    - sh -c "cd app && npm ci"
    - sh -c "cd app && npm run build"
    - sh -c "rsync -a --delete --exclude=.gitkeep app/out/ internal/webui/dist/"

builds:
  - id: otters
    main: ./cmd/otters
    binary: otters
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildSource=goreleaser

  - id: ottersd
    main: ./cmd/ottersd
    binary: ottersd
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildSource=goreleaser

archives:
  - id: all
    ids: [otters, ottersd]
    name_template: >-
      otters_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: otters
    repository:
      owner: openotters
      name: homebrew-tap
      # Optional: a PAT with repo scope on the tap. Set via env in CI.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/openotters/openotters
    description: "Build, run, and chat with AI agents"
    license: MIT
    install: |
      bin.install "otters"
      bin.install "ottersd"
    service: |
      run [opt_bin/"ottersd", "serve"]
      keep_alive successful_exit: false, crashed: true
      log_path var/"log/ottersd.log"
      error_log_path var/"log/ottersd.err.log"
    test: |
      assert_match "otters", shell_output("#{bin}/otters --version")
    caveats: |
      The otters daemon (ottersd) has been installed but is not running.

      To run it in the background (launchd on macOS, systemd --user on Linux):
        brew services start otters

      To run it in the foreground for debugging:
        ottersd serve

      Default paths and endpoints:
        socket:        ~/.otters/otters.sock
        agent data:    ~/.otters/agents
        logs:          #{var}/log/ottersd.{log,err.log} (service mode only)
        web UI + API:  http://127.0.0.1:5500  (loopback by default)

      The daemon ships with an embedded web UI baked into the binary —
      no separate install. Once ottersd is running, open
      http://127.0.0.1:5500 in your browser. The Connect/gRPC API is
      reachable on the same listener under /api.

      Customise the listener:
        ottersd serve --http-addr 127.0.0.1:8080   # change the port
        ottersd serve --no-ui                      # API only
        ottersd serve --no-http                    # CLI only (Unix socket)

      Non-loopback binds require --auth-token.

      Get started once the daemon is running:
        otters --help
        otters run <Agentfile>
        open http://127.0.0.1:5500

      Stop the service:
        brew services stop otters

release:
  github:
    owner: openotters
    name: openotters
  prerelease: auto
