version: v2
modules:
  - path: api
lint:
  use:
    - STANDARD
  except:
    # The proto pre-dates these rules; tightening would require wire-breaking
    # renames. Revisit when the API version bumps to v2.
    - PACKAGE_VERSION_SUFFIX
    - SERVICE_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
