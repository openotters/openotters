version: v2
plugins:
  # Go message types — `out: api` + paths=source_relative writes to
  # api/v1/daemon.pb.go, matching the proto's go_package and the
  # pre-existing layout.
  - local: protoc-gen-go
    out: api
    opt:
      - paths=source_relative

  # gRPC service stubs (server + client). The DAEMON server is now
  # served by protoc-gen-connect-go, but the CLI keeps using the
  # gRPC client (talks to the daemon's Connect-Go handler over h2c
  # — Connect-Go natively serves the gRPC protocol). Keeping
  # protoc-gen-go-grpc means the CLI's RuntimeClient stays unchanged.
  - local: protoc-gen-go-grpc
    out: api
    opt:
      - paths=source_relative

  # Connect-Go service stubs — emits into
  # api/v1/daemonv1connect/daemon.connect.go. The daemon's serve.go
  # uses the RuntimeHandler from this; the web app uses RuntimeClient
  # via the TS equivalent generated by @connectrpc/protoc-gen-connect-es.
  - local: protoc-gen-connect-go
    out: api
    opt:
      - paths=source_relative
