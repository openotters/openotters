syntax = "proto3";

package openotters.daemon.v1;

option go_package = "github.com/openotters/openotters/api/v1;daemonv1";

service Runtime {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc BuildAgent(BuildAgentRequest) returns (BuildAgentResponse);
  rpc BuildToolImage(BuildToolImageRequest) returns (BuildToolImageResponse);
  rpc SaveAgentImage(SaveAgentImageRequest) returns (SaveAgentImageResponse);
  rpc PullAgentImage(PullRequest) returns (PullResponse);
  rpc PushAgentImage(PushRequest) returns (PushResponse);
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc RefreshImage(RefreshImageRequest) returns (RefreshImageResponse);
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse);
  rpc DescribeImage(DescribeImageRequest) returns (DescribeImageResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc StartAgent(StartAgentRequest) returns (StartAgentResponse);
  rpc StopAgent(StopAgentRequest) returns (StopAgentResponse);
  rpc RemoveAgent(RemoveAgentRequest) returns (RemoveAgentResponse);
  rpc ChatWithAgent(ChatRequest) returns (ChatResponse);
  rpc PromptObject(PromptObjectRequest) returns (PromptObjectResponse);
  rpc ChatStreamWithAgent(ChatStreamRequest) returns (stream ChatStreamEvent);
  rpc ListSessionMessages(ListSessionMessagesRequest) returns (ListSessionMessagesResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);
  rpc GetAgentLogs(GetAgentLogsRequest) returns (GetAgentLogsResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  // ListAvailableProviders returns the curated Catwalk provider
  // catalogue — the set of provider slugs the runtime knows how to
  // talk to natively plus the OpenAI-compat fallback. The dashboard's
  // Add Provider form uses it to populate a combobox so operators
  // pick a known slug (gemini, anthropic, xai, …) instead of guessing.
  rpc ListAvailableProviders(ListAvailableProvidersRequest) returns (ListAvailableProvidersResponse);
  rpc AddProvider(AddProviderRequest) returns (AddProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc RemoveProvider(RemoveProviderRequest) returns (RemoveProviderResponse);

  // ── labels (shared semantics) ─────────────────────────────────────
  // Both agents and jobs accept arbitrary string labels at creation /
  // submit time, and both expose a label_selector filter on their
  // List RPC. The daemon stores label values verbatim and never
  // validates them.
  //
  // Standard labels (the io.openotters.* namespace is reserved —
  // future daemon versions may attach interpretation):
  //
  //   io.openotters.session-id   Chat session a job was originated
  //                              from. Jobs only — agents have many
  //                              sessions over their lifetime, so
  //                              this label has no defined meaning
  //                              when set on an agent.
  //   io.openotters.origin       What triggered the create / submit:
  //                              cli | chat | agent-tool | scheduler
  //                              | webhook | external. Applies to
  //                              both agents and jobs.
  //
  // Non-reserved keys (anything outside io.openotters.*) are stored
  // and filterable but otherwise opaque.

  // ── async jobs ────────────────────────────────────────────────────
  // Submit a BIN job to run against the agent's spawn env. Jobs are
  // attached to the agent — not to a session. The daemon does not
  // push results anywhere on completion: observers (agent runtime,
  // operator CLI, UI) read via GetAsyncJob / WatchAsyncJob and
  // decide their own watch strategy.
  rpc SubmitAsyncJob(SubmitAsyncJobRequest) returns (SubmitAsyncJobResponse);
  rpc CancelAsyncJob(CancelAsyncJobRequest) returns (CancelAsyncJobResponse);
  rpc GetAsyncJob(GetAsyncJobRequest)       returns (GetAsyncJobResponse);
  rpc ListAsyncJobs(ListAsyncJobsRequest)   returns (ListAsyncJobsResponse);

  // ── notes (per-agent KV store) ───────────────────────────────────
  // Operator-facing CRUD for an agent's notes (durable facts the
  // model wrote via the note_* tools). Each RPC proxies to the per-
  // agent runtime's gRPC NotesService and surfaces NotFound /
  // FailedPrecondition cleanly to the UI.
  rpc ListAgentNotes(ListAgentNotesRequest) returns (ListAgentNotesResponse);
  rpc GetAgentNote(GetAgentNoteRequest)     returns (GetAgentNoteResponse);
  rpc SaveAgentNote(SaveAgentNoteRequest)   returns (SaveAgentNoteResponse);
  rpc DeleteAgentNote(DeleteAgentNoteRequest) returns (DeleteAgentNoteResponse);
  rpc SetAgentNoteInContext(SetAgentNoteInContextRequest) returns (SetAgentNoteInContextResponse);

  // ── observability ────────────────────────────────────────────────
  // StreamRPCCalls tails the daemon's in-memory RPC ring buffer.
  // Operator-only (rejected for agent tokens). Always-on:
  // every Connect call hitting the daemon — including auth-failed
  // and future RPCs — is captured by the HTTP middleware without
  // any per-handler wiring; nothing is excluded except calls to
  // StreamRPCCalls itself (no feedback loop).
  rpc StreamRPCCalls(StreamRPCCallsRequest) returns (stream RPCCallEvent);

  // ── agent linking ───────────────────────────────────────────────
  // Operator-facing CRUD for the directed agent → agent call graph.
  // `otters link / unlink / links` map 1:1 to these RPCs. Auto-
  // restart of the source agent happens server-side on every
  // mutating call so the JWT (which carries the authoritative link
  // set) is always fresh.
  rpc LinkAgents(LinkAgentsRequest) returns (LinkAgentsResponse);
  rpc UnlinkAgents(UnlinkAgentsRequest) returns (UnlinkAgentsResponse);
  rpc ListAgentLinks(ListAgentLinksRequest) returns (ListAgentLinksResponse);

  // Agent-facing cross-agent RPCs. Caller must present an agent
  // token; target must be in the JWT's Links claim. Enforced
  // inside the handlers via requireLinkedTarget. agent_chat was
  // removed in alpha.85 — its semantics (threaded session,
  // memory-preserving) are now agent_exec's default once a
  // session_id is supplied.
  rpc AgentList(AgentListRequest) returns (AgentListResponse);
  rpc AgentInfo(AgentInfoRequest) returns (AgentInfoResponse);
  rpc AgentExec(AgentExecRequest) returns (AgentExecResponse);
  // Spawn / delete an agent and enumerate images / BIN images.
  // All four require an agent token (rejected for operator and
  // anonymous callers). agent_create rejects mounts and a
  // build-from-source path — those land on AgentCreateFromSource
  // and remain a separate capability operators opt into.
  // agent_delete is unrestricted: any authenticated agent caller
  // can delete any agent.
  rpc AgentCreate(AgentCreateRequest)                     returns (AgentCreateResponse);
  rpc AgentCreateFromSource(AgentCreateFromSourceRequest) returns (AgentCreateResponse);
  rpc AgentDelete(AgentDeleteRequest)                     returns (AgentDeleteResponse);
  rpc ImageList(ImageListRequest)                         returns (ImageListResponse);
  rpc BinList(BinListRequest)                             returns (BinListResponse);
  // SelfReload re-issues the caller's JWT against the current
  // agent_links table and bounces the caller's runtime so the
  // refreshed token takes effect. Required after agent_create
  // when the caller included its own ref in `links` and wants
  // to call the new agent — without it, the JWT in memory
  // still carries the stale Links claim from agent startup.
  rpc SelfReload(SelfReloadRequest) returns (SelfReloadResponse);

  // GetAgentIdentity exposes an agent's persisted JWT + decoded
  // claims for the operator UI's Identity tab. Operator-only
  // (rejected for agent tokens). The token field is the raw
  // signed JWT — the UI shows it behind a click-to-reveal toggle.
  rpc GetAgentIdentity(GetAgentIdentityRequest) returns (GetAgentIdentityResponse);
  // Server-streaming watch: emits the current AsyncJob immediately,
  // then again on every material change (status, handle, exit_code,
  // stdout, stderr, error, started_at, finished_at), then closes the
  // stream when the job reaches a terminal status. NotFound at start
  // when the job doesn't exist. Implemented as a server-side poll
  // (~250 ms) — observers see at most ~250 ms latency from a status
  // flip to the corresponding stream message.
  rpc WatchAsyncJob(WatchAsyncJobRequest) returns (stream WatchAsyncJobResponse);
}


message ListModelsRequest {}

message ListModelsResponse {
  repeated Model models = 1;
}

// Model is one entry in the daemon's provider catalogue — flattened
// across providers so `otters models ls` can render a single table.
// Ref is "<provider>/<name>", matching the format used by Agentfile's
// MODEL directive and `otters run --model`. Enriched metadata
// (display_name, context window, pricing, reasoning support) is
// populated from Catwalk when the provider is known there; zero for
// user-defined / self-hosted providers.
message Model {
  string provider = 1;
  string name = 2;
  string ref = 3;
  string api_base = 4;
  string display_name = 5;
  int64 context_window = 6;
  int64 default_max_tokens = 7;
  double cost_input_per_1m = 8;
  double cost_output_per_1m = 9;
  bool can_reason = 10;
}

message GetAgentLogsRequest {
  // Agent id, name, or id prefix — same resolver as start/stop/rm.
  string ref = 1;
  // Return at most this many trailing bytes. 0 means "no byte cap".
  int64 tail_bytes = 2;
  // Return at most this many trailing lines. 0 means "no line cap".
  // If both tail_bytes and tail_lines are non-zero, tail_lines wins.
  int64 tail_lines = 3;
}

message GetAgentLogsResponse {
  bytes content = 1;
  string path = 2;
}

message GetInfoRequest {}

message GetInfoResponse {
  string registry_addr = 1;
  string socket_path = 2;
  string log_dir = 3;
  string agents_dir = 4;
  string data_dir = 5;
  string runtime_path = 6;
  string version = 7;
  string commit = 8;
  string build_date = 9;
  int32 agents_running = 10;
  int32 agents_total = 11;
  int32 providers = 12;

  // Pool concurrency cap — maximum agents allowed to run at once.
  int32 max_concurrent = 13;

  // Auto-restart backoff schedule for failing agents (init / pull /
  // model errors). Formatted via Go's time.Duration.String() — e.g.
  // "1s", "500ms", "1m30s" — so the dashboard can render verbatim.
  string backoff_base = 14;
  string backoff_cap = 15;

  // Graceful shutdown deadline applied to in-flight HTTP / Connect
  // requests when the daemon receives SIGINT. Same string format as
  // the backoff fields above.
  string shutdown_timeout = 16;

  // Executor backend currently active: "system" (host subprocess
  // per agent) or "docker" (container per agent). Lets `otters info`
  // and the dashboard report which backend the daemon was started
  // with.
  string executor = 17;
}

message BuildAgentRequest {
  // Absolute or daemon-resolvable path to an Agentfile on the daemon
  // host's filesystem. Contexts and ADD files are read relative to the
  // file's directory as usual.
  string agentfile_path = 1;
  repeated string tags = 2;
  // Inline Agentfile content. When non-empty, the daemon writes it to
  // a temp file in its data dir and builds from there — used by the
  // web UI's "create agent on the fly" flow where the user has no
  // path on the daemon host. ADD/CONTEXT file:// references won't
  // resolve under inline mode (the temp dir has no siblings); pass an
  // agentfile_path instead when local files are needed.
  // Mutually exclusive with agentfile_path; if both are set, content
  // wins.
  bytes content = 3;
}

message BuildAgentResponse {
  string digest = 1;
  repeated string tags = 2;
  string ref = 3;
}

message ToolPlatform {
  string os       = 1; // "linux", "darwin", …
  string arch     = 2; // "amd64", "arm64", …
  string bin_path = 3; // absolute path on daemon host
}

message BuildToolImageRequest {
  string name        = 1;
  string description = 2;
  string usage       = 3;
  repeated string tags = 4;
  repeated ToolPlatform platforms = 5;
  // Upstream repo URL. When set, the daemon stamps the OCI
  // standard `org.opencontainers.image.source` annotation on
  // the produced manifest + index. ghcr.io reads this and
  // auto-links the package to the named GitHub repository,
  // inheriting its visibility (public repo → public package).
  string source      = 6;
  // Optional OCI image-spec annotations. Each one, when
  // non-empty, gets stamped onto the produced manifest +
  // index under its `org.opencontainers.image.<key>` name.
  // Empty values are omitted entirely rather than stamped
  // as "" so `otters bin inspect` only shows fields the
  // builder actually supplied.
  string version       = 7;  // org.opencontainers.image.version (e.g. v1.0.0-alpha.23)
  string revision      = 8;  // org.opencontainers.image.revision (git SHA)
  string licenses      = 9;  // org.opencontainers.image.licenses (SPDX expression)
  string vendor        = 10; // org.opencontainers.image.vendor
  string authors       = 11; // org.opencontainers.image.authors
  string url           = 12; // org.opencontainers.image.url
  string documentation = 13; // org.opencontainers.image.documentation
}

message BuildToolImageResponse {
  string digest = 1;
  repeated string tags = 2;
  string ref = 3;
}

message SaveAgentImageRequest {
  bytes oci_artifact = 1;
  repeated string tags = 2;
}

message SaveAgentImageResponse {
  string digest = 1;
  repeated string tags = 2;
}

message PullRequest {
  string ref = 1;
  repeated string tags = 2;
}

message PullResponse {
  string digest = 1;
  repeated string tags = 2;
}

message PushRequest {
  string ref = 1;
}

message PushResponse {
  string digest = 1;
  string ref = 2;
}

message ListImagesRequest {}

message ImageInfo {
  string ref = 1;
  string digest = 2;
  string artifact_type = 3;
  int64 size = 4;
  // Unix-seconds the manifest was first written to the local registry.
  // Surfaces as the "CREATED" column in `otters image ls`.
  int64 created_at = 5;

  // Free-text description from the OCI standard annotation
  // `org.opencontainers.image.description`. Producers (Agentfile
  // builds, tool images) stamp this via LABEL directives. Empty
  // when the producer didn't set the label.
  string description = 6;

  // URL of the upstream source repo from
  // `org.opencontainers.image.source`. The image listing renders
  // it as a clickable link when non-empty.
  string source = 7;
}

// AgentTool describes one BIN directive resolved against the local
// registry. Surfaced through AgentInfo.tools so `otters agent inspect`
// can show the exact image+digest each agent is bound to.
message AgentTool {
  string name = 1;
  string ref = 2;
  string digest = 3;
  string description = 4;
}

message ListImagesResponse {
  repeated ImageInfo images = 1;
}

message RefreshImageRequest {
  // Ref to refresh. The daemon re-reads this ref's metadata from
  // the executor registry and upserts the cache row.
  string ref = 1;
}

message RefreshImageResponse {
  string ref = 1;
  string digest = 2;
  string artifact_type = 3;
}

message RemoveImageRequest {
  string ref = 1;
}

message RemoveImageResponse {}

message DescribeImageRequest {
  string ref = 1;
}

message DescribeImageResponse {
  string ref = 1;
  string digest = 2;
  string artifact_type = 3;
  string config = 4;
  repeated string layers = 5;
  map<string, string> labels = 6;
}

message Mount {
  // Absolute host path. Resolved client-side (abs, tilde, CWD) before
  // the RPC; the daemon does not touch the user's filesystem lookup
  // rules beyond validating existence with os.Stat.
  string host = 1;
  // Chroot-relative path; must start with "/". Cleaned via
  // filepath.Clean; cannot collide with agent-internal prefixes
  // (/etc/context, /etc/data, /usr/bin, /usr/local/bin, /var).
  string target = 2;
  // Optional short description, surfaced to the LLM via the
  // auto-generated /etc/context/MOUNTS.md so the agent knows what
  // the mount is for without the user having to repeat it in prompt.
  string description = 3;
  // When true, the host bind is mounted read-only. Enforced on the
  // docker executor (mount.ReadOnly); the system executor surfaces
  // it to the model in MOUNTS.md but cannot enforce it (no sandbox).
  bool read_only = 4;
}

message CreateAgentRequest {
  string name = 1;
  string ref = 2;
  string model = 3;
  string runtime = 4;
  repeated Mount mounts = 5;
  // Per-run env overrides. Merged with the agent image's baked-in
  // ENV directives — a key set here wins. Reserved keys (PATH,
  // HOME, *_API_KEY, OTTERS_AGENT_ROOT, etc.) are rejected by
  // spec.Validate before the agent starts.
  repeated EnvOverride envs = 6;
  // Labels — see service-level "labels (shared semantics)" comment.
  map<string, string> labels = 7;
  // Outbound links to stamp into the new agent's JWT at create
  // time. Each entry is an agent ref (id, name, or UUID prefix);
  // the daemon resolves to ids and rejects unknown refs before
  // issuing the token. Empty ⇒ no outbound link permissions
  // (can be added later via LinkAgents).
  repeated string links = 8;
}

message EnvOverride {
  string key   = 1;
  string value = 2;
}

message CreateAgentResponse {
  string id = 1;
  string name = 2;
  string status = 3;
}

message ListAgentsRequest {
  // label_selector — every key=value pair must match (logical AND).
  // Empty map = no label filter. Compares against labels stored at
  // CreateAgent time; missing keys never match.
  map<string, string> label_selector = 1;
}

message AgentInfo {
  string id = 1;
  string name = 2;
  string model = 3;
  string status = 4;
  string root = 5;
  int64 created_at = 6;
  string addr = 7;
  string image = 8;
  repeated Mount mounts = 9;
  // Resolved digest of the agent's image (sha256:...). Only populated
  // for agents created since daemon startup; restored-from-state agents
  // surface an empty digest until their image is re-resolved.
  string image_digest = 10;
  // RUNTIME directive from the agent's Agentfile, e.g.
  // "ghcr.io/openotters/runtime:latest".
  string runtime_ref = 11;
  // Resolved digest of the runtime image. Same restored-state caveat
  // as image_digest.
  string runtime_digest = 12;
  // BIN directives from the agent's Agentfile.
  repeated AgentTool tools = 13;
  // Labels attached at CreateAgent time. Same shape and reserved
  // namespace as job labels — see the service-level comment.
  map<string, string> labels = 14;
  // failure_reason narrows status=failed to a specific cause so the
  // dashboard / CLI can explain why. Values:
  //   "pull"               image pull / network failure
  //   "init"               workspace materialise / container create failure
  //   "model"              provider / model resolution failure
  //   "readiness_timeout"  subprocess started but did not answer Ready()
  //                        within the daemon's readiness window
  //   "crashed"            subprocess exited unexpectedly after Ready
  //   ""                   no failure (status != "failed")
  string failure_reason = 15;
  // Runtime tool capabilities — the auto-injected tool names the
  // agent exposes (note_save, agent_create, job_submit, …). NOT
  // the BIN tools (those live in `tools` above). Surfaces in the
  // operator UI's Capabilities tab so the operator can see at a
  // glance what the model can do without inspecting AGENT.md.
  repeated string capabilities = 16;
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message StartAgentRequest {
  string ref = 1;
}

message StartAgentResponse {}

message StopAgentRequest {
  string ref = 1;
}

message StopAgentResponse {}

message RemoveAgentRequest {
  string ref = 1;
}

message RemoveAgentResponse {}

message ChatRequest {
  string ref = 1;
  string session_id = 2;
  string prompt = 3;
}

message ChatResponse {
  string response = 1;
}

// PromptObject sends a one-shot, stateless structured-output query
// to a running agent. schema_json is a JSON Schema doc that the
// runtime unmarshals into fantasy/schema.Schema. object_json is the
// resulting object (valid JSON bytes); raw_text is the model's raw
// reply, mostly useful for debugging when JSON repair kicked in.
message PromptObjectRequest {
  string ref         = 1;
  string prompt      = 2;
  bytes  schema_json = 3;
  string schema_name = 4;
  string schema_desc = 5;
}

message PromptObjectResponse {
  bytes  object_json = 1;
  string raw_text    = 2;
}

message ChatStreamRequest {
  string ref        = 1;
  string session_id = 2;
  string prompt     = 3;
  // When true, the runtime appends the produced parts as a new
  // branch onto the most recent assistant turn for session_id
  // instead of inserting a fresh row.
  bool   regenerate = 4;
}

message ChatStreamEvent {
  string type = 1;
  int32 step = 2;
  string tool = 3;
  string content = 4;
}

message ListSessionMessagesRequest {
  string ref        = 1;
  string session_id = 2;
  int32  limit      = 3;
}

message SessionMessage {
  string role          = 1; // "user" | "assistant"
  string content       = 2; // user: prompt text. assistant: JSON parts array.
  int64  created_at    = 3;
  string branches_json = 4; // assistant only: JSON array of alternative parts arrays
  int32  active_branch = 5; // assistant only: index of currently-active branch
}

message ListSessionMessagesResponse {
  repeated SessionMessage messages = 1;
}

message ListSessionsRequest {
  string ref = 1;
}

message SessionInfo {
  string id            = 1;
  int32  message_count = 2;
  int64  last_active   = 3;
}

message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message DeleteSessionRequest {
  string ref        = 1;
  string session_id = 2;
}

message DeleteSessionResponse {}

// Provider mirrors internal.ProviderConfig — the on-disk shape of an
// entry in ~/.otters/providers.yaml. api_key may be a plain value or
// a "${ENV_VAR}" reference; the daemon expands env at load. models
// (when non-empty) is the allowlist of model names this provider
// advertises; an empty list means "let the daemon advertise whatever
// the provider's API discovers / Catwalk knows about".
message Provider {
  string name = 1;
  string api_key = 2;
  string api_base = 3;
  repeated string models = 4;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated Provider providers = 1;
}

message ListAvailableProvidersRequest {}

message ListAvailableProvidersResponse {
  repeated AvailableProvider providers = 1;
}

// AvailableProvider is one Catwalk catalogue entry — a provider the
// runtime can talk to (either natively or through the openaicompat
// fallback) with enough metadata to pre-fill the Add Provider form:
// id is the slug to type into providers.yaml, name is human-readable,
// api_endpoint is the upstream default URL.
message AvailableProvider {
  // Catwalk-canonical slug (matches providers.yaml's name field and
  // the runtime's createProvider switch). Examples: "gemini",
  // "anthropic", "openai", "xai".
  string id = 1;
  // Human-readable name from Catwalk, e.g. "Google Gemini".
  string name = 2;
  // Default upstream API URL from Catwalk. Operators can override
  // when configuring a proxy / gateway.
  string api_endpoint = 3;
  // Suggested default model id — the one Catwalk flags as the
  // provider's flagship. Optional; empty when Catwalk doesn't
  // declare one.
  string default_model = 4;
  // Number of models Catwalk knows about for this provider. Lets
  // the UI surface a "12 models available" hint without sending
  // the full model list down the wire.
  int32 model_count = 5;
}

message AddProviderRequest {
  Provider provider = 1;
}

message AddProviderResponse {
  Provider provider = 1;
}

message UpdateProviderRequest {
  Provider provider = 1;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

message RemoveProviderRequest {
  string name = 1;
}

message RemoveProviderResponse {}

// ── async jobs ──────────────────────────────────────────────────────

message SubmitAsyncJobRequest {
  // agent_ref is the agent name OR UUID (same resolution as
  // ChatWithAgent's `ref`). The agent must be running.
  string  agent_ref  = 1;
  string  bin        = 2;
  repeated string args = 3;
  string  stdin      = 4;
  // labels are arbitrary metadata attached to the job. See the
  // service-level comment for standard io.openotters.* keys. The
  // daemon stores them verbatim and exposes them on every read; it
  // never validates or interprets the values.
  map<string, string> labels = 5;
}

message SubmitAsyncJobResponse {
  string job_id = 1;
}

message CancelAsyncJobRequest  { string job_id = 1; }
message CancelAsyncJobResponse {}

message GetAsyncJobRequest  { string job_id = 1; }
message GetAsyncJobResponse { AsyncJob job = 1; }

message WatchAsyncJobRequest  { string job_id = 1; }
message WatchAsyncJobResponse { AsyncJob job = 1; }

message ListAsyncJobsRequest {
  string agent_id = 1;             // empty = all agents
  string status   = 2;             // empty = all statuses
  // label_selector — every key=value pair must match (logical AND).
  // Empty map = no label filter. Compares against the labels stored
  // at submit time; non-existent keys never match.
  map<string, string> label_selector = 3;
}
message ListAsyncJobsResponse {
  repeated AsyncJob jobs = 1;
}

message AsyncJob {
  string  id           = 1;
  string  agent_id     = 2;
  // field 3 reserved — was `session_id` before jobs were detached
  // from sessions and migrated to a label (io.openotters.session-id).
  reserved 3;
  reserved "session_id";
  string  bin          = 4;
  repeated string args = 5;
  string  stdin        = 6;
  string  status       = 7;        // 'pending'|'running'|'done'|'error'|'cancelled'|'orphaned'
  string  handle       = 8;        // PID (system) or container ID (docker); empty when not yet known
  int32   exit_code    = 9;
  string  stdout       = 10;
  string  stderr       = 11;
  string  error        = 12;
  int64   created_at   = 13;       // unix seconds
  int64   started_at   = 14;
  int64   finished_at  = 15;
  map<string, string> labels = 16;
}

// ── notes ──────────────────────────────────────────────────────────
// Mirrors the runtime's NotesAPI; the daemon proxies each RPC to the
// per-agent runtime gRPC. `ref` accepts either an agent UUID or a
// human-readable name (same resolver as ChatWithAgent).

message AgentNote {
  string key        = 1;
  string content    = 2;  // empty in list responses; full body in Get / Save
  string preview    = 3;
  bool   in_context = 4;
  int64  created_at = 5;  // unix seconds
  int64  updated_at = 6;
}

message ListAgentNotesRequest {
  string ref             = 1;
  bool   only_in_context = 2;
}
message ListAgentNotesResponse {
  repeated AgentNote notes = 1;
}

message GetAgentNoteRequest {
  string ref = 1;
  string key = 2;
}
message GetAgentNoteResponse {
  AgentNote note = 1;
}

message SaveAgentNoteRequest {
  string ref     = 1;
  string key     = 2;
  string content = 3;
  // 0 → use the agent.yaml-configured caps server-side. Non-zero
  // overrides for this single call.
  int32  max_bytes = 4;
  int32  max_count = 5;
}
message SaveAgentNoteResponse {
  AgentNote note     = 1;
  bool      overwrote = 2;
}

message DeleteAgentNoteRequest {
  string ref = 1;
  string key = 2;
}
message DeleteAgentNoteResponse {
  // True when the key existed before delete; false on no-op. Both
  // forms still return a success response — Delete is idempotent.
  bool deleted = 1;
}

message SetAgentNoteInContextRequest {
  string ref        = 1;
  string key        = 2;
  bool   in_context = 3;
}
message SetAgentNoteInContextResponse {
  AgentNote note = 1;
}

// ── observability ──────────────────────────────────────────────────
// One row in the daemon's RPC ring buffer. Filled by the
// observability HTTP middleware on every request return. Fields
// reflect what's observable at the HTTP layer — no payloads, no
// auth headers, no JWT contents.

message RPCCallEvent {
  int64  timestamp_unix_ms = 1;
  string service           = 2; // e.g. "Runtime" — last path segment of fully-qualified name
  string procedure         = 3; // e.g. "SaveAgentNote"
  string caller            = 4; // "operator" / "agent:<ref>" / "anonymous"
  string status            = 5; // "ok" / "unauthenticated" / "internal" / "http_<n>"
  int64  duration_us       = 6;
  int64  bytes_in          = 7;
  int64  bytes_out         = 8;
  string err_message       = 9;  // populated when status != "ok"
  string stream_type       = 10; // "unary" / "server-stream"
}

message StreamRPCCallsRequest {
  // Filters AND together. Empty fields = no filter.
  string service_prefix    = 1; // matches service exactly when non-empty
  string procedure_prefix  = 2; // strings.HasPrefix(procedure, this)
  string caller_kind       = 3; // "" / "operator" / "agent" / "anonymous"
  string agent_id          = 4; // only when caller_kind == "agent"
  string status            = 5; // "" / "ok" / "error" / specific lowercase code
  int64  min_duration_us   = 6;
  // Send the last N matching events from the ring before going
  // live. Clamped to ring capacity.
  int32  replay_recent     = 7;
}

// ── AgentState service ───────────────────────────────────────────
// Called only by per-agent runtimes via the same JWT they use for
// the job-tool callback. Every RPC is scoped server-side to the
// JWT's agent_ref claim — no request carries an agent_id field, so
// a compromised agent can't read or mutate another agent's state.
//
// The runtime's pkg/memory.Store and pkg/notes.Store interfaces
// move from local sqlite (per-agent FHS) to daemon-backed gRPC.
// This service is the wire image of those two stores combined.

service AgentState {
  // Messages — chat history + branches.
  rpc ListMessages(StateListMessagesRequest)         returns (StateListMessagesResponse);
  rpc AppendMessage(StateAppendMessageRequest)       returns (StateAppendMessageResponse);
  rpc ReplaceMessages(StateReplaceMessagesRequest)   returns (StateReplaceMessagesResponse);
  rpc UpdateMessageBranches(StateUpdateBranchesRequest) returns (StateUpdateBranchesResponse);
  rpc LastAssistantMessage(StateLastAssistantRequest) returns (StateLastAssistantResponse);
  rpc CountMessages(StateCountMessagesRequest)       returns (StateCountMessagesResponse);

  // Sessions — derived from messages (no separate table).
  rpc ListSessions(StateListSessionsRequest)         returns (StateListSessionsResponse);
  rpc DeleteSession(StateDeleteSessionRequest)       returns (StateDeleteSessionResponse);

  // Notes — the per-agent KV.
  rpc ListNotes(StateListNotesRequest)               returns (StateListNotesResponse);
  rpc GetNote(StateGetNoteRequest)                   returns (StateGetNoteResponse);
  rpc SaveNote(StateSaveNoteRequest)                 returns (StateSaveNoteResponse);
  rpc DeleteNote(StateDeleteNoteRequest)             returns (StateDeleteNoteResponse);
  rpc SetNoteInContext(StateSetNoteInContextRequest) returns (StateSetNoteInContextResponse);
  rpc CountNotes(StateCountNotesRequest)             returns (StateCountNotesResponse);
}

// MessageRow is the wire form of one row in agent_messages. The
// runtime hydrates `content` + `branches_json` into typed fantasy
// parts; the daemon never inspects them.
message MessageRow {
  int64  id            = 1;
  string session_id    = 2;
  string role          = 3;
  string content       = 4;
  string branches_json = 5;
  int32  active_branch = 6;
  int64  created_unix  = 7;
}

message StateListMessagesRequest {
  string session_id = 1;
  // 0 = server default (matches the runtime's existing LIMIT 50).
  int32  limit      = 2;
}
message StateListMessagesResponse {
  repeated MessageRow messages = 1;
}

message StateAppendMessageRequest {
  string session_id = 1;
  string role       = 2;
  string content    = 3;
}
message StateAppendMessageResponse {
  int64 id = 1;
}

message StateReplaceMessagesRequest {
  string session_id = 1;
  // Compactor calls this with the full survivor set after a
  // summarise / slide. Server replaces all rows for the session
  // atomically; the previous order is lost.
  repeated MessageRow messages = 2;
}
message StateReplaceMessagesResponse {}

message StateUpdateBranchesRequest {
  int64  id            = 1;
  string content       = 2;
  string branches_json = 3;
  int32  active_branch = 4;
}
message StateUpdateBranchesResponse {}

message StateLastAssistantRequest {
  string session_id = 1;
}
message StateLastAssistantResponse {
  // Present when the session has at least one assistant turn.
  MessageRow message = 1;
  bool       found   = 2;
}

message StateCountMessagesRequest {
  string session_id = 1;
}
message StateCountMessagesResponse {
  int32 count = 1;
}

message StateSessionInfo {
  string id            = 1;
  int32  message_count = 2;
  int64  last_active   = 3; // unix seconds
}

message StateListSessionsRequest {}
message StateListSessionsResponse {
  repeated StateSessionInfo sessions = 1;
}

message StateDeleteSessionRequest {
  string session_id = 1;
}
message StateDeleteSessionResponse {}

// NoteRow mirrors notes.Note. Content is omitted in ListNotes
// responses to keep payloads small (callers issue GetNote for
// bodies).
message NoteRow {
  string key        = 1;
  string content    = 2;
  string preview    = 3;
  bool   in_context = 4;
  int64  created_unix = 5;
  int64  updated_unix = 6;
}

message StateListNotesRequest {
  bool only_in_context = 1;
}
message StateListNotesResponse {
  repeated NoteRow notes = 1;
}

message StateGetNoteRequest {
  string key = 1;
}
message StateGetNoteResponse {
  NoteRow note = 1;
}

message StateSaveNoteRequest {
  string key       = 1;
  string content   = 2;
  // Quotas mirror the runtime's Save signature. 0 = no cap.
  int32  max_bytes = 3;
  int32  max_count = 4;
}
message StateSaveNoteResponse {
  NoteRow note      = 1;
  bool    overwrote = 2;
}

message StateDeleteNoteRequest {
  string key = 1;
}
message StateDeleteNoteResponse {
  bool existed = 1;
}

message StateSetNoteInContextRequest {
  string key        = 1;
  bool   in_context = 2;
}
message StateSetNoteInContextResponse {
  NoteRow note = 1;
}

message StateCountNotesRequest {}
message StateCountNotesResponse {
  int32 count = 1;
}

// ── agent linking ────────────────────────────────────────────────
//
// Directed graph: source can call target. Operator commands take
// agent refs (id/name/prefix — same resolver as ChatWithAgent);
// agent-facing RPCs take refs too, but the AgentLinked interceptor
// rejects them unless the resolved target id is in the caller's
// JWT.Links claim.
//
// LinkedAgent is the wire form of one edge endpoint — id + name
// + model + status, enough for the UI's Links table and for the
// model's agent_list / agent_info responses without a second
// round-trip.

message LinkedAgent {
  string id     = 1;
  string name   = 2;
  string model  = 3;
  string status = 4;
  // The effective description shown to the operator + the model.
  // When the link carried a per-link override (LinkAgentsRequest.
  // description), that wins; otherwise the daemon falls back to
  // the target agent's `description` label.
  string description = 5;
}

message LinkAgentsRequest {
  string source_ref = 1;
  string target_ref = 2;
  // Optional. Per-link description that overrides the target's
  // baked-in `description` label when this link is surfaced to
  // the model (agent_list / agent_info) or the operator UI.
  // Empty ⇒ fall back to the target's label.
  string description = 3;
}
message LinkAgentsResponse {
  // True when the source agent was running and got auto-restarted
  // to pick up the refreshed JWT.
  bool restarted = 1;
}

message UnlinkAgentsRequest {
  string source_ref = 1;
  string target_ref = 2;
}
message UnlinkAgentsResponse {
  bool restarted = 1;
}

message ListAgentLinksRequest {
  string ref = 1;
}
message ListAgentLinksResponse {
  repeated LinkedAgent outbound = 1; // agents `ref` can call
  repeated LinkedAgent inbound  = 2; // agents that can call `ref`
}

// Agent-facing — caller is identified by JWT, target by `ref`.
// `ref` accepts id/name (the daemon resolves); the resolved id
// must be in the JWT's Links for the interceptor to accept.

message AgentListRequest {}
message AgentListResponse {
  repeated LinkedAgent agents = 1;
}

message AgentInfoRequest {
  string ref = 1;
}
message AgentInfoResponse {
  LinkedAgent agent           = 1;
  string      description     = 2;  // from labels["description"]
  repeated string capabilities = 3; // tool function names the target exposes
}

message AgentExecRequest {
  string ref        = 1;
  string prompt     = 2;
  // Optional. Empty → server mints a fresh session id, formatted
  // `from-agent:<source-id>:<uuid>` so cross-agent sessions are
  // self-describing in the target's session list. Reuse the
  // returned session_id on subsequent agent_exec calls to keep
  // memory on the target — the target sees a continuing
  // conversation, not isolated one-shots.
  string session_id = 3;
}
message AgentExecResponse {
  string response   = 1;
  // The session id the target persisted the turn under. Always
  // non-empty; the caller threads it through subsequent calls
  // to preserve history with that target.
  string session_id = 2;
}

// ── agent self-management (agent_create, agent_delete) ──────────
// Agents with the corresponding capability can spawn and delete
// agents through these RPCs. Mounts are intentionally absent on
// AgentCreate{,FromSource} — the agent can't open host-filesystem
// holes by mounting /etc or ~/.ssh into a child. agent_delete is
// unrestricted: any authenticated agent caller can delete any
// agent, including operator-created ones.

message AgentCreateRequest {
  string ref         = 1;  // image ref (e.g. "kubectl:latest")
  string name        = 2;  // optional; daemon auto-generates if empty
  string model       = 3;  // optional; overrides image MODEL directive
  repeated EnvOverride envs = 4;
  // INBOUND links to the new agent: each ref becomes a source
  // that can call the new agent. Include your own ref to gain
  // call permission yourself — then call SelfReload after this
  // RPC so your runtime picks up the refreshed JWT (without that,
  // your in-memory token still carries the pre-link claim set).
  // Unknown source refs fail the create.
  repeated string links     = 5;
  string description = 6;  // → labels["description"]
}
message AgentCreateResponse {
  string id     = 1;
  string name   = 2;
  string status = 3;
}

// Build a fresh image from an inline Agentfile body, then spawn
// an agent from it. Powerful — a compromised orchestrator with
// this capability can assemble any BIN combination available
// locally. Operators attach the `agent_create_from_source`
// capability deliberately; `agent_create` alone is the safer
// default.
//
// The Agentfile body must be self-contained: no COPY-from-host,
// no file uploads. BIN / FROM refs are resolved against the
// local registry as usual. The resulting image is stamped with
// a recognizable ref prefix so image_list / the UI can show
// provenance.
message AgentCreateFromSourceRequest {
  bytes  agentfile   = 1;  // raw Agentfile body
  string name        = 2;
  string model       = 3;
  repeated EnvOverride envs = 4;
  // Same INBOUND semantics as AgentCreateRequest.links.
  repeated string links     = 5;
  string description = 6;
}

message AgentDeleteRequest  { string ref = 1; }
message AgentDeleteResponse {}

// SelfReload — caller identified by JWT, no fields needed.
message SelfReloadRequest  {}
message SelfReloadResponse {
  // True when the caller's runtime was running and got
  // restarted to pick up the refreshed token. False when the
  // daemon had no signing key configured (test path) or the
  // runtime wasn't running — in both cases the new token is
  // persisted but no restart was needed.
  bool restarted = 1;
}

// ── agent-facing image / bin enumeration ─────────────────────────
// ImageList / BinList are the agent-facing twins of the operator
// `otters image ls` / `otters bin ls` CLIs, scoped to the trimmed
// ImageRow shape (ref / digest / description / size) so the model
// doesn't have to wade through layer JSON or label maps.

message ImageRow {
  string ref         = 1;
  string digest      = 2;
  string description = 3;
  int64  size        = 4;
}

message ImageListRequest  {}
message ImageListResponse {
  repeated ImageRow images = 1;
}

message BinListRequest  {}
message BinListResponse {
  repeated ImageRow bins = 1;
}

// ── operator-facing agent identity (UI Identity tab) ─────────────
// Surfaces the agent's persisted JWT + decoded claims for the
// operator UI. Rejected for agent tokens — agents already see
// their own claims via the runtime; this RPC's purpose is to let
// the operator inspect any agent's identity without opening
// daemon.db.

message GetAgentIdentityRequest {
  string ref = 1;
}

message AgentIdentityClaims {
  string issuer     = 1;
  string agent_ref  = 2;
  string jti        = 3;
  int64  issued_at  = 4;
  int64  expires_at = 5;
  repeated string links = 6;
  // Capabilities is the runtime-injected tool surface stamped on
  // the JWT at issue time. Informational only — auth doesn't read
  // it. Surfaces in the operator UI's Identity tab so the operator
  // can see what tools the agent's token claims without inspecting
  // AGENT.md or agent.yaml.
  repeated string capabilities = 7;
}

message GetAgentIdentityResponse {
  string token = 1;
  AgentIdentityClaims claims = 2;
}
