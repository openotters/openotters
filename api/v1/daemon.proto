syntax = "proto3";

package openotters.daemon.v1;

option go_package = "github.com/openotters/openotters/api/v1;daemonv1";

service Runtime {
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc BuildAgent(BuildAgentRequest) returns (BuildAgentResponse);
  rpc BuildToolImage(BuildToolImageRequest) returns (BuildToolImageResponse);
  rpc SaveAgentImage(SaveAgentImageRequest) returns (SaveAgentImageResponse);
  rpc PullAgentImage(PullRequest) returns (PullResponse);
  rpc PushAgentImage(PushRequest) returns (PushResponse);
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse);
  rpc DescribeImage(DescribeImageRequest) returns (DescribeImageResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc StartAgent(StartAgentRequest) returns (StartAgentResponse);
  rpc StopAgent(StopAgentRequest) returns (StopAgentResponse);
  rpc RemoveAgent(RemoveAgentRequest) returns (RemoveAgentResponse);
  rpc ChatWithAgent(ChatRequest) returns (ChatResponse);
  rpc PromptObject(PromptObjectRequest) returns (PromptObjectResponse);
  rpc ChatStreamWithAgent(ChatStreamRequest) returns (stream ChatStreamEvent);
  rpc ListSessionMessages(ListSessionMessagesRequest) returns (ListSessionMessagesResponse);
  rpc GetAgentLogs(GetAgentLogsRequest) returns (GetAgentLogsResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc AddProvider(AddProviderRequest) returns (AddProviderResponse);
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);
  rpc RemoveProvider(RemoveProviderRequest) returns (RemoveProviderResponse);
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated Model models = 1;
}

// Model is one entry in the daemon's provider catalogue — flattened
// across providers so `otters models ls` can render a single table.
// Ref is "<provider>/<name>", matching the format used by Agentfile's
// MODEL directive and `otters run --model`. Enriched metadata
// (display_name, context window, pricing, reasoning support) is
// populated from Catwalk when the provider is known there; zero for
// user-defined / self-hosted providers.
message Model {
  string provider = 1;
  string name = 2;
  string ref = 3;
  string api_base = 4;
  string display_name = 5;
  int64 context_window = 6;
  int64 default_max_tokens = 7;
  double cost_input_per_1m = 8;
  double cost_output_per_1m = 9;
  bool can_reason = 10;
}

message GetAgentLogsRequest {
  // Agent id, name, or id prefix — same resolver as start/stop/rm.
  string ref = 1;
  // Return at most this many trailing bytes. 0 means "no byte cap".
  int64 tail_bytes = 2;
  // Return at most this many trailing lines. 0 means "no line cap".
  // If both tail_bytes and tail_lines are non-zero, tail_lines wins.
  int64 tail_lines = 3;
}

message GetAgentLogsResponse {
  bytes content = 1;
  string path = 2;
}

message GetInfoRequest {}

message GetInfoResponse {
  string registry_addr = 1;
  string socket_path = 2;
  string log_dir = 3;
  string agents_dir = 4;
  string data_dir = 5;
  string runtime_path = 6;
  string version = 7;
  string commit = 8;
  string build_date = 9;
  int32 agents_running = 10;
  int32 agents_total = 11;
  int32 providers = 12;
}

message BuildAgentRequest {
  // Absolute or daemon-resolvable path to an Agentfile on the daemon
  // host's filesystem. Contexts and ADD files are read relative to the
  // file's directory as usual.
  string agentfile_path = 1;
  repeated string tags = 2;
  // Inline Agentfile content. When non-empty, the daemon writes it to
  // a temp file in its data dir and builds from there — used by the
  // web UI's "create agent on the fly" flow where the user has no
  // path on the daemon host. ADD/CONTEXT file:// references won't
  // resolve under inline mode (the temp dir has no siblings); pass an
  // agentfile_path instead when local files are needed.
  // Mutually exclusive with agentfile_path; if both are set, content
  // wins.
  bytes content = 3;
}

message BuildAgentResponse {
  string digest = 1;
  repeated string tags = 2;
  string ref = 3;
}

message ToolPlatform {
  string os       = 1; // "linux", "darwin", …
  string arch     = 2; // "amd64", "arm64", …
  string bin_path = 3; // absolute path on daemon host
}

message BuildToolImageRequest {
  string name        = 1;
  string description = 2;
  string usage       = 3;
  repeated string tags = 4;
  repeated ToolPlatform platforms = 5;
}

message BuildToolImageResponse {
  string digest = 1;
  repeated string tags = 2;
  string ref = 3;
}

message SaveAgentImageRequest {
  bytes oci_artifact = 1;
  repeated string tags = 2;
}

message SaveAgentImageResponse {
  string digest = 1;
  repeated string tags = 2;
}

message PullRequest {
  string ref = 1;
  repeated string tags = 2;
}

message PullResponse {
  string digest = 1;
  repeated string tags = 2;
}

message PushRequest {
  string ref = 1;
}

message PushResponse {
  string digest = 1;
  string ref = 2;
}

message ListImagesRequest {}

message ImageInfo {
  string ref = 1;
  string digest = 2;
  string artifact_type = 3;
  int64 size = 4;
  // Unix-seconds the manifest was first written to the local registry.
  // Surfaces as the "CREATED" column in `otters image ls`.
  int64 created_at = 5;
}

// AgentTool describes one BIN directive resolved against the local
// registry. Surfaced through AgentInfo.tools so `otters agent inspect`
// can show the exact image+digest each agent is bound to.
message AgentTool {
  string name = 1;
  string ref = 2;
  string digest = 3;
  string description = 4;
}

message ListImagesResponse {
  repeated ImageInfo images = 1;
}

message RemoveImageRequest {
  string ref = 1;
}

message RemoveImageResponse {}

message DescribeImageRequest {
  string ref = 1;
}

message DescribeImageResponse {
  string ref = 1;
  string digest = 2;
  string artifact_type = 3;
  string config = 4;
  repeated string layers = 5;
  map<string, string> labels = 6;
}

message Mount {
  // Absolute host path. Resolved client-side (abs, tilde, CWD) before
  // the RPC; the daemon does not touch the user's filesystem lookup
  // rules beyond validating existence with os.Stat.
  string host = 1;
  // Chroot-relative path; must start with "/". Cleaned via
  // filepath.Clean; cannot collide with agent-internal prefixes
  // (/etc/context, /etc/data, /usr/bin, /usr/local/bin, /var).
  string target = 2;
  // Optional short description, surfaced to the LLM via the
  // auto-generated /etc/context/MOUNTS.md so the agent knows what
  // the mount is for without the user having to repeat it in prompt.
  string description = 3;
}

message CreateAgentRequest {
  string name = 1;
  string ref = 2;
  string model = 3;
  string runtime = 4;
  repeated Mount mounts = 5;
}

message CreateAgentResponse {
  string id = 1;
  string name = 2;
  string status = 3;
}

message ListAgentsRequest {}

message AgentInfo {
  string id = 1;
  string name = 2;
  string model = 3;
  string status = 4;
  string root = 5;
  int64 created_at = 6;
  string addr = 7;
  string image = 8;
  repeated Mount mounts = 9;
  // Resolved digest of the agent's image (sha256:...). Only populated
  // for agents created since daemon startup; restored-from-state agents
  // surface an empty digest until their image is re-resolved.
  string image_digest = 10;
  // RUNTIME directive from the agent's Agentfile, e.g.
  // "ghcr.io/openotters/runtime:latest".
  string runtime_ref = 11;
  // Resolved digest of the runtime image. Same restored-state caveat
  // as image_digest.
  string runtime_digest = 12;
  // BIN directives from the agent's Agentfile.
  repeated AgentTool tools = 13;
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message StartAgentRequest {
  string ref = 1;
}

message StartAgentResponse {}

message StopAgentRequest {
  string ref = 1;
}

message StopAgentResponse {}

message RemoveAgentRequest {
  string ref = 1;
}

message RemoveAgentResponse {}

message ChatRequest {
  string ref = 1;
  string session_id = 2;
  string prompt = 3;
}

message ChatResponse {
  string response = 1;
}

// PromptObject sends a one-shot, stateless structured-output query
// to a running agent. schema_json is a JSON Schema doc that the
// runtime unmarshals into fantasy/schema.Schema. object_json is the
// resulting object (valid JSON bytes); raw_text is the model's raw
// reply, mostly useful for debugging when JSON repair kicked in.
message PromptObjectRequest {
  string ref         = 1;
  string prompt      = 2;
  bytes  schema_json = 3;
  string schema_name = 4;
  string schema_desc = 5;
}

message PromptObjectResponse {
  bytes  object_json = 1;
  string raw_text    = 2;
}

message ChatStreamRequest {
  string ref = 1;
  string session_id = 2;
  string prompt = 3;
}

message ChatStreamEvent {
  string type = 1;
  int32 step = 2;
  string tool = 3;
  string content = 4;
}

message ListSessionMessagesRequest {
  string ref        = 1;
  string session_id = 2;
  int32  limit      = 3;
}

message SessionMessage {
  string role       = 1;
  string content    = 2;
  int64  created_at = 3;
}

message ListSessionMessagesResponse {
  repeated SessionMessage messages = 1;
}

// Provider mirrors internal.ProviderConfig — the on-disk shape of an
// entry in ~/.otters/providers.yaml. api_key may be a plain value or
// a "${ENV_VAR}" reference; the daemon expands env at load. models
// (when non-empty) is the allowlist of model names this provider
// advertises; an empty list means "let the daemon advertise whatever
// the provider's API discovers / Catwalk knows about".
message Provider {
  string name = 1;
  string api_key = 2;
  string api_base = 3;
  repeated string models = 4;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated Provider providers = 1;
}

message AddProviderRequest {
  Provider provider = 1;
}

message AddProviderResponse {
  Provider provider = 1;
}

message UpdateProviderRequest {
  Provider provider = 1;
}

message UpdateProviderResponse {
  Provider provider = 1;
}

message RemoveProviderRequest {
  string name = 1;
}

message RemoveProviderResponse {}
